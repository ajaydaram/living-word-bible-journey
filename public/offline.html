<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline | The Living Word Bible Journey</title>
    <meta name="theme-color" content="#5A5A40" />
    <style>
      :root {
        --olive: #5a5a40;
        --paper: #f5f5f0;
        --ink: #1f1f18;
        --clay: #7a705d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #fbfaf6 0%, #efeee7 55%, #e7e4d8 100%);
        color: var(--ink);
        font-family: Georgia, "Times New Roman", serif;
        padding: 24px;
      }

      .card {
        width: min(680px, 100%);
        background: rgba(245, 245, 240, 0.94);
        border: 1px solid rgba(90, 90, 64, 0.15);
        border-radius: 24px;
        padding: 32px;
        box-shadow: 0 14px 36px rgba(31, 31, 24, 0.09);
      }

      .badge {
        display: inline-block;
        font-family: Arial, sans-serif;
        font-weight: 700;
        letter-spacing: 0.16em;
        font-size: 10px;
        text-transform: uppercase;
        color: var(--clay);
        margin-bottom: 12px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(1.7rem, 4vw, 2.3rem);
        color: var(--olive);
      }

      p {
        margin: 0 0 16px;
        line-height: 1.6;
      }

      .actions {
        margin-top: 14px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      a,
      button {
        border: 0;
        border-radius: 999px;
        padding: 10px 16px;
        font: 700 12px/1 Arial, sans-serif;
        letter-spacing: 0.11em;
        text-transform: uppercase;
        cursor: pointer;
        text-decoration: none;
      }

      .primary {
        background: var(--olive);
        color: var(--paper);
      }

      .secondary {
        background: transparent;
        color: var(--olive);
        border: 1px solid rgba(90, 90, 64, 0.25);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge">Offline Mode</div>
      <h1>The Living Word is temporarily offline</h1>
      <p>You are not connected right now. Your app is installed and ready, but fresh scripture requests need internet access.</p>
      <p>Reconnect and retry to continue your journey from where you left off.</p>
      <div class="actions">
        <button class="primary" onclick="window.location.reload()">Try Again</button>
        <a class="secondary" href="/">Go Home</a>
      </div>
    </main>
  </body>
</html>
